<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Md Shamim</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: auto;
}

/* HEADER */
header {
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url("cover/cover.jpg");
  background-size: cover;
  background-position: center;
  border-radius: 15px;
  text-align: center;
  padding: 50px 20px;
  color: white;
}

/* PROFILE IMAGE */
header img {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  border: 4px solid white;
  object-fit: cover;
  margin-bottom: 10px;
}

/* SECTION */
section {
  background: white;
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
}

/* TITLE */
h2 {
  color: #1877f2;
  margin-bottom: 10px;
}

/* CONTACT */
.contact a {
  display: inline-block;
  margin: 5px;
  padding: 10px 15px;
  background: #1877f2;
  color: white;
  border-radius: 8px;
  text-decoration: none;
}

/* GALLERY */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 10px;
}

.gallery img {
  width: 100%;
  height: 160px;
  object-fit: cover;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>
    <img src="profile.jpg">
    <h1>Md Shamim</h1>
    <p>আমার ব্যক্তিগত ওয়েবসাইটে আপনাকে স্বাগতম</p>
  </header>

  <!-- ABOUT -->
  <section>
    <h2>আমার সম্পর্কে</h2>
    <p>নাম: Md Shamim</p>
    <p>ঠিকানা: Mohadevpur, Naogaon, Rajshahi</p>
    <p>পেশা: Freelancer</p>
    <p>ব্লাড গ্রুপ: A+</p>
  </section>

  <!-- CONTACT -->
  <section>
    <h2>যোগাযোগ</h2>
    <div class="contact">
      <a href="#">Facebook</a>
      <a href="#">Instagram</a>
      <a href="#">WhatsApp</a>
    </div>
  </section>

  <!-- GALLERY -->
  <section>
    <h2>আমার ছবি</h2>
    <div class="gallery">
      <img src="pic1.jpg">
      <img src="images2/pic2.jpg">
      <img src="pic3.jpg">
      <img src="pic4.png">
    </div>
  </section>

  <footer style="text-align:center; margin:20px;">
    © 2025 Md Shamim
  </footer>

</div>

</body>
</html>
