  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: url("background.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #111827;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: 30px auto;
    }

    header {
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      text-align: center;
      padding: 40px 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }

    header img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid white;
      margin-bottom: 10px;
    }

    header h1 {
      font-size: 32px;
      margin-bottom: 5px;
    }

    header p {
      font-size: 16px;
    }

    section {
      margin-top: 25px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
    }

    h2 {
      color: #0284c7;
      margin-bottom: 15px;
    }

    .about p {
      margin-bottom: 8px;
    }

    .contact {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .contact a {
      padding: 10px 15px;
      background: #0ea5e9;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .contact a:hover {
      background: #0284c7;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .gallery img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      margin: 30px 0;
      font-size: 14px;
    }
  </style>
</head>
